{% extends 'booking/base.html' %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Logged Out</h3>
                </div>
                <div class="card-body text-center">
                    <p class="lead">You have been successfully logged out.</p>
                    <p>Thank you for using our services!</p>
                    <a href="{% url 'login' %}" class="btn btn-primary mt-3">Log in again</a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary mt-3">Return to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
