{% extends 'base.html' %}

{% block title %}Password Reset Complete - Therapy Booking{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Password Reset Complete</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill fs-1 text-success"></i>
                    </div>
                    <p class="lead">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary mt-3">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
