{% load crispy_forms_field %}

<div class="rating-field">
    <div class="rating-options d-flex">
        {% for choice in field.field.choices %}
        <div class="rating-option me-3">
            <input type="radio" name="{{ field.html_name }}" id="{{ field.auto_id }}_{{ forloop.counter0 }}" value="{{ choice.0 }}" 
                {% if field.value == choice.0|stringformat:"s" %}checked{% endif %}>
            <label for="{{ field.auto_id }}_{{ forloop.counter0 }}" class="rating-label">
                {% for i in "12345" %}
                    {% if forloop.counter <= choice.0 %}
                    <i class="bi bi-star-fill text-warning"></i>
                    {% else %}
                    <i class="bi bi-star text-muted"></i>
                    {% endif %}
                {% endfor %}
                <span class="d-block small mt-1">{{ choice.1 }}</span>
            </label>
        </div>
        {% endfor %}
    </div>
    {% if field.errors %}
    <div class="invalid-feedback d-block">
        {% for error in field.errors %}{{ error }}{% endfor %}
    </div>
    {% endif %}
    {% if field.help_text %}
    <small class="form-text text-muted">{{ field.help_text }}</small>
    {% endif %}
</div>
